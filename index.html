<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Keto Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #fdfaf6; --accent: #007aff; --card: #ffffff; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #333; }
        .page { display: none; } .active { display: block; }
        
        /* Dashboard */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .item { background: var(--card); padding: 12px; border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .label { font-size: 10px; color: #999; text-transform: uppercase; }
        .val { font-size: 16px; font-weight: bold; display: block; margin-top: 4px; }
        
        /* UI Elements */
        input, select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; font-size: 16px; box-sizing: border-box; margin-top: 5px; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 12px; font-weight: bold; margin-top: 10px; cursor: pointer; }
        .btn-main { background: var(--accent); color: white; }
        .btn-sec { background: #fff; border: 1px solid var(--accent); color: var(--accent); }
        
        /* Psychotype */
        .psy-res { background: #1a1a1a; color: #fff; padding: 15px; border-radius: 15px; margin-top: 15px; }
        .psy-line { margin-bottom: 8px; font-size: 12px; border-left: 2px solid var(--accent); padding-left: 10px; opacity: 0.9; }
        
        .card { background: rgba(0,0,0,0.03); padding: 10px; border-radius: 10px; margin: 8px 0; font-size: 12px; border: 2px solid transparent; }
        .card.selected { border-color: var(--accent); background: #fff; font-weight: bold; }
        .status-msg { background: #e2f7db; color: #28a745; padding: 12px; border-radius: 10px; font-size: 12px; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

<div id="p-profile" class="page active">
    <div id="view-mode">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h2 style="margin:0">Профиль</h2>
            <button class="btn-sec" style="width:auto; padding: 6px 12px; font-size:12px;" onclick="toggleEdit()">Править</button>
        </div>
        
        <div class="grid">
            <div class="item"><span class="label">Возраст</span><span class="val" id="d-age">—</span></div>
            <div class="item"><span class="label">Пол</span><span class="val" id="d-gender">—</span></div>
            <div class="item"><span class="label">Рост</span><span class="val" id="d-height">—</span></div>
            <div class="item"><span class="label">Вес</span><span class="val" id="d-weight">—</span></div>
            <div class="item"><span class="label">Давление</span><span class="val" id="d-bp">—</span></div>
            <div class="item"><span class="label">Пульс</span><span class="val" id="d-pulse">—</span></div>
        </div>

        <div id="psy-display" class="psy-res" style="display:none">
            <div style="font-size:10px; opacity:0.5; text-align:center; margin-bottom:10px;">ВАШ ПСИХОТИП</div>
            <div id="psy-text"></div>
        </div>

        <div style="margin-top:20px;">
            <div id="labs-box"><button class="btn btn-sec" onclick="pick('labs')">📄 Внести анализы</button></div>
            <div id="nails-box"><button class="btn btn-sec" onclick="pick('nails')">💅 Фото ногтей</button></div>
        </div>
    </div>

    <div id="edit-mode" style="display:none">
        <h3>Настройка данных</h3>
        <input type="number" id="f-age" placeholder="Возраст">
        <select id="f-gender"><option value="male">Мужской</option><option value="female">Женский</option></select>
        <input type="number" id="f-height" placeholder="Рост (см)">
        <input type="number" id="f-weight" step="0.1" placeholder="Вес (кг)">
        <input type="number" id="f-pulse" placeholder="Пульс">
        <div style="display:flex; gap:10px; margin-top:10px;">
            <select id="f-bp-s"></select><span>/</span><select id="f-bp-d"></select>
        </div>
        <button class="btn btn-main" onclick="push(false)">Сохранить</button>
        <button class="btn-sec" onclick="toggleEdit()">Отмена</button>
    </div>

    <div id="test-sec" style="margin-top:30px; border-top: 1px solid #eee; padding-top:20px;">
        <h3>Тест на стихии</h3>
        <div id="test-cont"></div>
        <button id="ready-btn" class="btn btn-main" style="display:none; background:#28a745" onclick="push(true)">ГОТОВО</button>
    </div>
</div>

<input type="file" id="file-picker" style="display:none" onchange="upload(this)">

<script>
    let tg = window.Telegram.WebApp; tg.expand();
    const API_URL = "https://depletion-kindling-diffusive.ngrok-free.dev"; 

    // ЕДИНЫЙ ИСТОЧНИК ИСТИНЫ
    let STATE = { age:'', gender:'male', height:'', weight:'', pulse:'', bp:'120/80', air:null, fire:null, water:null, earth:null };

    const TEXTS = {
        air: ["1. Ведущий: Мир — система.", "2. Проводник: Мыслительный процесс.", "3. Хрупкий: Боязнь ошибки.", "4. Опора: Инструкции и правила."],
        fire: ["1. Ведущий: Моя воля — закон.", "2. Проводник: Вдохновляю других.", "3. Хрупкий: Трудный выбор.", "4. Опора: Выбор делегирую."],
        water: ["1. Ведущий: Эмоции — реальность.", "2. Проводник: Эмпатия и уют.", "3. Хрупкий: Скрытность.", "4. Опора: Спокойствие."],
        earth: ["1. Ведущий: Здоровье тела.", "2. Проводник: Забота и быт.", "3. Хрупкий: Мнительность.", "4. Опора: Тело — инструмент."]
    };

    async function init() {
        // Заполняем селекторы давления
        const s = document.getElementById('f-bp-s'), d = document.getElementById('f-bp-d');
        for(let i=80; i<=200; i+=10) s.innerHTML += `<option value="${i}">${i}</option>`;
        for(let i=50; i<=120; i+=10) d.innerHTML += `<option value="${i}">${i}</option>`;

        // Рендерим тест
        const cont = document.getElementById('test-cont');
        const config = [{id:'air', n:'Воздух'}, {id:'fire', n:'Огонь'}, {id:'water', n:'Вода'}, {id:'earth', n:'Земля'}];
        config.forEach(el => {
            let h = `<div style="margin-top:10px;"><strong>${el.n}</strong>`;
            TEXTS[el.id].forEach((t, i) => { h += `<div class="card" data-type="${el.id}" data-pos="${i+1}" onclick="sel('${el.id}',${i+1},this)">${t}</div>`; });
            cont.innerHTML += h + `</div>`;
        });

        // Грузим данные из БД
        const r = await fetch(`${API_URL}/api/get_profile/${tg.initDataUnsafe?.user?.id || 777}`);
        const data = await r.json();
        if(data.status !== "new") {
            STATE = { ...STATE, ...data, air:data.air_pos, fire:data.fire_pos, water:data.water_pos, earth:data.earth_pos };
            renderUI();
        }
    }

    function renderUI() {
        // Текст в Dashboard
        document.getElementById('d-age').innerText = STATE.age || '—';
        document.getElementById('d-height').innerText = STATE.height ? STATE.height+' см' : '—';
        document.getElementById('d-weight').innerText = STATE.weight ? STATE.weight+' кг' : '—';
        document.getElementById('d-pulse').innerText = STATE.pulse ? STATE.pulse+' уд/мин' : '—';
        document.getElementById('d-gender').innerText = STATE.gender === 'male' ? 'М' : 'Ж';
        document.getElementById('d-bp').innerText = STATE.blood_pressure || '—';
        
        // Значения в инпутах
        document.getElementById('f-age').value = STATE.age || '';
        document.getElementById('f-height').value = STATE.height || '';
        document.getElementById('f-weight').value = STATE.weight || '';
        document.getElementById('f-pulse').value = STATE.pulse || '';
        document.getElementById('f-gender').value = STATE.gender || 'male';

        // Текст психотипа
        if(STATE.air) {
            document.getElementById('psy-text').innerHTML = `
                <div class="psy-line">💨 ${TEXTS.air[STATE.air-1]}</div>
                <div class="psy-line">🔥 ${TEXTS.fire[STATE.fire-1]}</div>
                <div class="psy-line">💧 ${TEXTS.water[STATE.water-1]}</div>
                <div class="psy-line">🌍 ${TEXTS.earth[STATE.earth-1]}</div>`;
            document.getElementById('psy-display').style.display = 'block';
            document.getElementById('test-sec').style.display = 'none';
        }
    }

    function sel(t, p, el) {
        for(let k in STATE) if(['air','fire','water','earth'].includes(k) && STATE[k] === p && k !== t) { tg.showAlert("Занято!"); return; }
        document.querySelectorAll(`[data-type="${t}"]`).forEach(c => c.classList.remove('selected'));
        el.classList.add('selected'); 
        STATE[t] = p;
        if(STATE.air && STATE.fire && STATE.water && STATE.earth) document.getElementById('ready-btn').style.display = 'block';
    }

    async function push(isTest) {
        // Собираем актуальные данные из формы в STATE перед отправкой
        if(!isTest) {
            STATE.age = document.getElementById('f-age').value;
            STATE.height = document.getElementById('f-height').value;
            STATE.weight = document.getElementById('f-weight').value;
            STATE.pulse = document.getElementById('f-pulse').value;
            STATE.gender = document.getElementById('f-gender').value;
            STATE.blood_pressure = document.getElementById('f-bp-s').value + '/' + document.getElementById('f-bp-d').value;
        }

        const payload = {
            age: STATE.age, height: STATE.height, weight: STATE.weight, pulse: STATE.pulse,
            gender: STATE.gender, blood_pressure: STATE.blood_pressure,
            air_pos: STATE.air, fire_pos: STATE.fire, water_pos: STATE.water, earth_pos: STATE.earth
        };

        await fetch(`${API_URL}/api/save_profile/${tg.initDataUnsafe?.user?.id || 777}`, { 
            method:'POST', 
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload) 
        });
        if(isTest) tg.close(); else location.reload();
    }

    function toggleEdit() {
        const v = document.getElementById('view-mode'), e = document.getElementById('edit-mode');
        v.style.display = v.style.display==='none'?'block':'none'; e.style.display = e.style.display==='none'?'block':'none';
    }

    let upT = '';
    function pick(t) { upT = t; document.getElementById('file-picker').click(); }
    async function upload(input) {
        const f = new FormData(); f.append('file', input.files[0]);
        await fetch(`${API_URL}/api/upload_photo/${tg.initDataUnsafe?.user?.id || 777}/${upT}`, { method:'POST', body: f });
        document.getElementById(upT+'-box').innerHTML = `<div class="status-msg">✅ Учтено в программе. <span onclick="pick('${upT}')" style="text-decoration:underline; cursor:pointer">Добавить</span></div>`;
    }

    init();
</script>
</body>
</html>

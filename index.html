<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Keto Cabinet</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #fdfaf6; --accent: #007aff; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #333; }
        .page { display: none; } .active { display: block; }
        .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: #fff; padding: 15px; border-radius: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .data-item { font-size: 11px; color: #999; text-transform: uppercase; }
        .data-value { font-size: 16px; font-weight: bold; color: #000; display: block; margin-top: 2px; }
        .input-box { margin-bottom: 12px; }
        label { display: block; font-size: 11px; color: #999; margin-bottom: 4px; }
        input, select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; font-size: 16px; box-sizing: border-box; background: #fff; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 12px; font-weight: bold; margin-top: 10px; cursor: pointer; }
        .btn-main { background: var(--accent); color: white; }
        .btn-sec { background: #fff; border: 1px solid var(--accent); color: var(--accent); }
        .card { background: rgba(0,0,0,0.03); padding: 12px; border-radius: 10px; margin: 8px 0; font-size: 13px; border: 2px solid transparent; transition: 0.2s; }
        .card.selected { border-color: var(--accent); background: #fff; font-weight: bold; }
        .card.disabled { opacity: 0.3; pointer-events: none; }
        .psychotype-res { background: #1a1a1a; color: #fff; padding: 15px; border-radius: 15px; margin-top: 15px; text-align: left; font-size: 13px; line-height: 1.5; }
        .status-ok { background: #e2f7db; color: #28a745; padding: 12px; border-radius: 12px; font-size: 12px; text-align: center; margin-top: 10px; border: 1px solid #28a745; }
    </style>
</head>
<body>

<div id="p-profile" class="page active">
    <div id="view-mode">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h2 style="margin:0">Профиль</h2>
            <button class="btn-sec" style="width:auto; padding: 6px 15px;" onclick="toggleEdit()">Править</button>
        </div>
        <div class="data-grid">
            <div class="data-item">Возраст<span class="data-value" id="v-age">—</span></div>
            <div class="data-item">Пол<span class="data-value" id="v-gender">—</span></div>
            <div class="data-item">Рост<span class="data-value" id="v-height">—</span></div>
            <div class="data-item">Вес<span class="data-value" id="v-weight">—</span></div>
            <div class="data-item">Давление<span class="data-value" id="v-bp">—</span></div>
            <div class="data-item">Пульс<span class="data-value" id="v-pulse">—</span></div>
        </div>
        
        <div id="psychotype-display" class="psychotype-res" style="display:none">
            <div style="font-size:11px; opacity:0.6; margin-bottom:10px; text-align:center;">ВАШ ПСИХОТИП</div>
            <div id="v-psycho-text"></div>
        </div>

        <div style="margin-top:20px;">
            <div id="labs-container"><button class="btn btn-sec" onclick="openPicker('labs')">📄 Внести анализы</button></div>
            <div id="nails-container"><button class="btn btn-sec" onclick="openPicker('nails')">💅 Фото ногтей</button></div>
        </div>
    </div>

    <div id="edit-mode" style="display:none">
        <h2>Настройка</h2>
        <div class="input-box"><label>Возраст (18+)</label><input type="number" id="age"></div>
        <div class="input-box"><label>Пол</label>
            <select id="gender"><option value="male">Мужской</option><option value="female">Женский</option></select>
        </div>
        <div class="input-box"><label>Рост (см)</label><input type="number" id="height"></div>
        <div class="input-box"><label>Вес (кг)</label><input type="number" id="weight" step="0.1"></div>
        <div class="input-box"><label>Пульс</label><input type="number" id="pulse"></div>
        <div class="input-box"><label>Давление (шаг 10)</label>
            <div style="display:flex; align-items:center; gap:10px;">
                <select id="bp_sys"></select> <span>/</span> <select id="bp_dia"></select>
            </div>
        </div>
        <button class="btn btn-main" onclick="validateSave(false)">Сохранить</button>
        <button class="btn-sec" style="width:100%" onclick="toggleEdit()">Отмена</button>
    </div>

    <div id="test-section" style="margin-top:30px; border-top: 1px dotted #ccc; padding-top: 20px;">
        <h3>Тест на стихии</h3>
        <div id="test-container"></div>
        <button id="ready-btn" class="btn btn-main" style="display:none; background:#28a745;" onclick="validateSave(true)">ГОТОВО</button>
    </div>
</div>

<input type="file" id="file-picker" style="display:none" onchange="uploadFile(this)">

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();
    const API_URL = "https://depletion-kindling-diffusive.ngrok-free.dev"; // ЗАМЕНИТЬ ПЕРЕД ЗАПУСКОМ

    let res = { air: null, fire: null, water: null, earth: null };
    
    // Тексты для теста и отображения в профиле
    const psychotype_texts = {
        air: ['1. Ведущий: Мир — система.', '2. Проводник: Мыслительный процесс.', '3. Хрупкий: Боязнь ошибки.', '4. Опора: Инструкции и правила.'],
        fire: ['1. Ведущий: Моя воля — закон.', '2. Проводник: Вдохновляю других.', '3. Хрупкий: Трудный выбор.', '4. Опора: Делегирую выбор.'],
        water: ['1. Ведущий: Эмоции — реальность.', '2. Проводник: Эмпатия и уют.', '3. Хрупкий: Скрытность и ранимость.', '4. Опора: Спокойствие.'],
        earth: ['1. Ведущий: Телесное здоровье.', '2. Проводник: Забота и быт.', '3. Хрупкий: Мнительность к телу.', '4. Опора: Тело — инструмент.']
    };

    const els = [
        {id:'air', n:'Воздух (Air)', c:'#f2f2f2', t: psychotype_texts.air}, 
        {id:'fire', n:'Огонь (Fire)', c:'#f7dcdb', t: psychotype_texts.fire},
        {id:'water', n:'Вода (Water)', c:'#dbe4f7', t: psychotype_texts.water}, 
        {id:'earth', n:'Земля (Earth)', c:'#e2f7db', t: psychotype_texts.earth}
    ];

    function fillBP() {
        const s = document.getElementById('bp_sys'), d = document.getElementById('bp_dia');
        for(let i=80; i<=200; i+=10) s.innerHTML += `<option value="${i}">${i}</option>`;
        for(let i=50; i<=120; i+=10) d.innerHTML += `<option value="${i}">${i}</option>`;
        s.value = 120; d.value = 80;
    }

    function renderTest() {
        const container = document.getElementById('test-container');
        els.forEach(el => {
            let h = `<div style="background:${el.c}; padding:15px; border-radius:15px; margin-top:15px;"><strong>Стихия: ${el.n}</strong>`;
            el.t.forEach((text, i) => {
                h += `<div class="card" data-type="${el.id}" data-pos="${i+1}" onclick="sel('${el.id}', ${i+1}, this)">${text}</div>`;
            });
            container.innerHTML += h + `</div>`;
        });
    }

    async function init() {
        fillBP(); renderTest();
        const uid = tg.initDataUnsafe?.user?.id || 777;
        try {
            const r = await fetch(`${API_URL}/api/get_profile/${uid}`);
            const d = await r.json();
            if (d.status !== "new") {
                // Принудительная запись данных в инпуты, чтобы не стирались при сохранении
                if (d.age) { document.getElementById('age').value = d.age; document.getElementById('v-age').innerText = d.age; }
                if (d.height) { document.getElementById('height').value = d.height; document.getElementById('v-height').innerText = d.height + ' см'; }
                if (d.weight) { document.getElementById('weight').value = d.weight; document.getElementById('v-weight').innerText = d.weight + ' кг'; }
                if (d.pulse) { document.getElementById('pulse').value = d.pulse; document.getElementById('v-pulse').innerText = d.pulse + ' уд/мин'; }
                if (d.gender) { document.getElementById('gender').value = d.gender; document.getElementById('v-gender').innerText = d.gender === 'male' ? 'М' : 'Ж'; }
                
                if (d.blood_pressure) {
                    const b = d.blood_pressure.split('/');
                    document.getElementById('bp_sys').value = b[0];
                    document.getElementById('bp_dia').value = b[1];
                    document.getElementById('v-bp').innerText = d.blood_pressure;
                }

                if (d.air) {
                    res = { air: d.air, fire: d.fire, water: d.water, earth: d.earth };
                    
                    // Вывод полных текстовых строк
                    let psychoText = `
                        <div style="margin-bottom:8px;">💨 ${psychotype_texts.air[d.air - 1]}</div>
                        <div style="margin-bottom:8px;">🔥 ${psychotype_texts.fire[d.fire - 1]}</div>
                        <div style="margin-bottom:8px;">💧 ${psychotype_texts.water[d.water - 1]}</div>
                        <div>🌍 ${psychotype_texts.earth[d.earth - 1]}</div>
                    `;
                    document.getElementById('v-psycho-text').innerHTML = psychoText;
                    document.getElementById('psychotype-display').style.display = 'block';
                    document.getElementById('test-section').style.display = 'none';
                }
            }
        } catch(e) { console.error(e); }
    }
    init();

    function sel(type, pos, el) {
        for (let t in res) { if (res[t] === pos && t !== type) { tg.showAlert("Позиция занята!"); return; } }
        document.querySelectorAll(`[data-type="${type}"]`).forEach(c => c.classList.remove('selected'));
        el.classList.add('selected');
        res[type] = pos;
        const picked = Object.values(res).filter(v => v !== null);
        document.querySelectorAll('.card').forEach(c => {
            const p = parseInt(c.dataset.pos);
            if (picked.includes(p) && res[c.dataset.type] !== p) c.classList.add('disabled');
            else c.classList.remove('disabled');
        });
        if (picked.length === 4) document.getElementById('ready-btn').style.display = 'block';
    }

    function validateSave(isTest) {
        const uid = tg.initDataUnsafe?.user?.id || 777;
        
        // Сборка JSON напрямую из DOM элементов
        const payload = {
            age: document.getElementById('age').value,
            gender: document.getElementById('gender').value,
            height: document.getElementById('height').value,
            weight: document.getElementById('weight').value,
            pulse: document.getElementById('pulse').value,
            blood_pressure: document.getElementById('bp_sys').value + '/' + document.getElementById('bp_dia').value,
            air_pos: res.air, fire_pos: res.fire, water_pos: res.water, earth_pos: res.earth
        };

        fetch(`${API_URL}/api/save_profile/${uid}`, {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        }).then(() => { if (isTest) tg.close(); else location.reload(); });
    }

    function toggleEdit() {
        const v = document.getElementById('view-mode'), e = document.getElementById('edit-mode');
        v.style.display = (v.style.display==='none')?'block':'none';
        e.style.display = (e.style.display==='none')?'block':'none';
    }

    let upType = '';
    function openPicker(t) { upType = t; document.getElementById('file-picker').click(); }
    
    async function uploadFile(input) {
        if (!input.files[0]) return;
        const uid = tg.initDataUnsafe?.user?.id || 777;
        const form = new FormData(); form.append('file', input.files[0]);
        await fetch(`${API_URL}/api/upload_photo/${uid}/${upType}`, { method: 'POST', body: form });
        
        const container = document.getElementById(upType === 'labs' ? 'labs-container' : 'nails-container');
        container.innerHTML = `<div class="status-ok">✅ Загружено и учтено. <span onclick="openPicker('${upType}')" style="text-decoration:underline; cursor:pointer;">Добавить еще</span></div>`;
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; 
               background-color: var(--tg-theme-bg-color); color: var(--tg-theme-text-color); }
        .info { border: 1px solid #ccc; padding: 20px; margin: 20px; border-radius: 10px; }
    </style>
</head>
<body>
    <h1>Keto Going</h1>
    <div class="info">
        <p>Привет, <span id="user-name">...</span>!</p>
        <p>Твой ID: <span id="user-id">...</span></p>
    </div>
    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); // Сообщаем Telegram, что приложение загрузилось
        
        document.getElementById('user-name').innerText = tg.initDataUnsafe.user.first_name;
        document.getElementById('user-id').innerText = tg.initDataUnsafe.user.id;
    </script>
</body>
</html>

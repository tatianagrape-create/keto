<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Keto Cabinet</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #fdfaf6; --accent: #007aff; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #333; }
        .page { display: none; } .page.active { display: block; }
        .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: #fff; padding: 15px; border-radius: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .data-item { font-size: 11px; color: #999; text-transform: uppercase; }
        .data-value { font-size: 16px; font-weight: bold; color: #000; display: block; margin-top: 2px; }
        .input-box { margin-bottom: 15px; }
        input, select { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd; font-size: 16px; background: #fff; }
        .btn { width: 100%; padding: 14px; border: none; border-radius: 12px; font-weight: bold; margin-top: 10px; cursor: pointer; }
        .btn-main { background: var(--accent); color: white; }
        .btn-sec { background: #fff; border: 1px solid var(--accent); color: var(--accent); }
        .card { background: rgba(255,255,255,0.7); padding: 12px; border-radius: 10px; margin: 8px 0; font-size: 13px; border: 2px solid transparent; }
        .card.selected { border-color: var(--accent); background: #fff; font-weight: bold; }
        .card.disabled { opacity: 0.2; pointer-events: none; filter: grayscale(1); }
        .psychotype-res { background: #1a1a1a; color: #fff; padding: 15px; border-radius: 15px; margin-top: 15px; text-align: center; }
        .psychotype-code { font-size: 24px; font-weight: bold; color: #007aff; }
        .status-msg { background: #e2f7db; color: #28a745; padding: 12px; border-radius: 12px; font-size: 12px; text-align: center; margin-top: 10px; border: 1px solid #28a745; }
    </style>
</head>
<body>

<div id="p-profile" class="page active">
    <div id="view-mode">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h2 style="margin:0">Профиль</h2>
            <button class="btn-sec" style="width:auto; padding: 6px 15px;" onclick="toggleEdit()">Править</button>
        </div>
        <div class="data-grid">
            <div class="data-item">Возраст<span class="data-value" id="v-age">—</span></div>
            <div class="data-item">Пол<span class="data-value" id="v-gender">—</span></div>
            <div class="data-item">Рост<span class="data-value" id="v-height">—</span></div>
            <div class="data-item">Вес<span class="data-value" id="v-weight">—</span></div>
            <div class="data-item">Давление<span class="data-value" id="v-bp">—</span></div>
            <div class="data-item">Пульс<span class="data-value" id="v-pulse">—</span></div>
        </div>
        <div id="psychotype-display" class="psychotype-res" style="display:none">
            <div style="font-size:11px; opacity:0.6;">ВАШ ПСИХОТИП</div>
            <div class="psychotype-code" id="v-psycho">—</div>
        </div>
        <div style="margin-top:20px;">
            <div id="labs-container"><button class="btn btn-sec" onclick="openPicker('labs')">📄 Внести анализы</button></div>
            <div id="nails-container"><button class="btn btn-sec" onclick="openPicker('nails')">💅 Фото ногтей</button></div>
        </div>
    </div>

    <div id="edit-mode" style="display:none">
        <h2>Настройка</h2>
        <div class="input-box"><label>Возраст (18+)</label><input type="number" id="age" min="18"></div>
        <div class="input-box"><label>Пол</label><select id="gender"><option value="male">Мужской</option><option value="female">Женский</option></select></div>
        <div class="input-box"><label>Рост (см)</label><input type="number" id="height"></div>
        <div class="input-box"><label>Вес (кг)</label><input type="number" id="weight" step="0.1"></div>
        <div class="input-box"><label>Пульс в покое</label><input type="number" id="pulse" placeholder="70"></div>
        <div class="input-box"><label>Давление (ШАГ 10)</label>
            <div style="display:flex; align-items:center; gap:10px;">
                <select id="bp_sys"></select> <span>/</span> <select id="bp_dia"></select>
            </div>
        </div>
        <button class="btn btn-main" onclick="validateAndSave()">Сохранить</button>
        <button class="btn-sec" style="width:100%" onclick="toggleEdit()">Отмена</button>
    </div>

    <div id="test-section" style="margin-top:30px; border-top: 1px dotted #ccc; padding-top: 20px;">
        <h3>Тест на психотипаж</h3>
        <div id="test-container"></div>
        <button id="ready-btn" class="btn btn-main" style="display:none; background:#28a745;" onclick="validateAndSave(true)">ГОТОВО</button>
    </div>
</div>

<input type="file" id="file-picker" style="display:none" onchange="processUpload(this)">

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();
    const API_URL = "https://depletion-kindling-diffusive.ngrok-free.dev"; 

    let res = { air: null, fire: null, water: null, earth: null };
    const elements = [
        {id:'air', n:'Air (A)', c:'#f2f2f2', q:['1. Ведущий','2. Проводник','3. Хрупкий','4. Опора']},
        {id:'fire', n:'Fire (F)', c:'#f7dcdb', q:['1. Ведущий','2. Проводник','3. Хрупкий','4. Опора']},
        {id:'water', n:'Water (W)', c:'#dbe4f7', q:['1. Ведущий','2. Проводник','3. Хрупкий','4. Опора']},
        {id:'earth', n:'Earth (E)', c:'#e2f7db', q:['1. Ведущий','2. Проводник','3. Хрупкий','4. Опора']}
    ];

    function fillBP() {
        const s = document.getElementById('bp_sys'), d = document.getElementById('bp_dia');
        for(let i=80; i<=200; i+=10) s.innerHTML += `<option value="${i}">${i}</option>`;
        for(let i=50; i<=120; i+=10) d.innerHTML += `<option value="${i}">${i}</option>`;
        s.value = 120; d.value = 80;
    }

    function renderTest() {
        const container = document.getElementById('test-container');
        elements.forEach(el => {
            let h = `<div style="background:${el.c}; border-radius:15px; padding:15px; margin-top:15px;"><strong>Стихия ${el.n}</strong>`;
            el.q.forEach((q, i) => {
                h += `<div class="card" data-type="${el.id}" data-pos="${i+1}" onclick="sel('${el.id}', ${i+1}, this)">${q}</div>`;
            });
            container.innerHTML += h + `</div>`;
        });
    }

    async function init() {
        fillBP(); renderTest();
        const uid = tg.initDataUnsafe?.user?.id || 777;
        try {
            const r = await fetch(`${API_URL}/api/get_profile/${uid}`);
            const d = await r.json();
            if (d.status !== "new") {
                // Показываем в профиле
                document.getElementById('v-age').innerText = d.age || '—';
                document.getElementById('v-gender').innerText = d.gender === 'male' ? 'М' : 'Ж';
                document.getElementById('v-height').innerText = d.height ? d.height + ' см' : '—';
                document.getElementById('v-weight').innerText = d.weight ? d.weight + ' кг' : '—';
                document.getElementById('v-bp').innerText = d.blood_pressure || '—';
                document.getElementById('v-pulse').innerText = d.pulse ? d.pulse + ' уд/мин' : '—';
                
                // Сразу заполняем инпуты (чтобы при сохранении не было пустых строк)
                document.getElementById('age').value = d.age || '';
                document.getElementById('gender').value = d.gender || 'male';
                document.getElementById('height').value = d.height || '';
                document.getElementById('weight').value = d.weight || '';
                document.getElementById('pulse').value = d.pulse || '';
                if(d.blood_pressure) {
                    const parts = d.blood_pressure.split('/');
                    document.getElementById('bp_sys').value = parts[0];
                    document.getElementById('bp_dia').value = parts[1];
                }

                if (d.air) {
                    res = { air: d.air, fire: d.fire, water: d.water, earth: d.earth };
                    document.getElementById('v-psycho').innerText = `A${res.air}, F${res.fire}, W${res.water}, E${res.earth}`;
                    document.getElementById('psychotype-display').style.display = 'block';
                    document.getElementById('test-section').style.display = 'none';
                }
            }
        } catch(e) {}
    }
    init();

    function sel(type, pos, el) {
        for (let t in res) { if (res[t] === pos && t !== type) { tg.showAlert("Эта позиция уже занята!"); return; } }
        document.querySelectorAll(`[data-type="${type}"]`).forEach(c => c.classList.remove('selected'));
        el.classList.add('selected');
        res[type] = pos;
        updateTestUI();
    }

    function updateTestUI() {
        const picked = Object.values(res).filter(v => v !== null);
        document.querySelectorAll('.card').forEach(c => {
            const p = parseInt(c.dataset.pos);
            if (picked.includes(p) && res[c.dataset.type] !== p) c.classList.add('disabled');
            else c.classList.remove('disabled');
        });
        if (picked.length === 4) document.getElementById('ready-btn').style.display = 'block';
    }

    function validateAndSave(isTest = false) {
        const age = parseInt(document.getElementById('age').value);
        if (age < 18) return tg.showAlert("Программа доступна только с 18 лет!");
        saveData(isTest);
    }

    async function saveData(isTest) {
        const uid = tg.initDataUnsafe?.user?.id || 777;
        const bp = document.getElementById('bp_sys').value + '/' + document.getElementById('bp_dia').value;
        const payload = {
            age: document.getElementById('age').value,
            gender: document.getElementById('gender').value,
            height: document.getElementById('height').value,
            weight: document.getElementById('weight').value,
            pulse: document.getElementById('pulse').value,
            blood_pressure: bp,
            fire_pos: res.fire, water_pos: res.water, air_pos: res.air, earth_pos: res.earth
        };
        try {
            await fetch(`${API_URL}/api/save_profile/${uid}`, {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            if (isTest) tg.close(); else location.reload();
        } catch (e) { tg.showAlert("Ошибка связи с сервером"); }
    }

    function toggleEdit() {
        const v = document.getElementById('view-mode'), e = document.getElementById('edit-mode');
        v.style.display = (v.style.display==='none')?'block':'none';
        e.style.display = (e.style.display==='none')?'block':'none';
    }

    function openPicker(t) { uploadMode = t; document.getElementById('file-picker').click(); }
    async function processUpload(input) {
        if (!input.files[0]) return;
        const uid = tg.initDataUnsafe?.user?.id || 777;
        const form = new FormData(); form.append('file', input.files[0]);
        try {
            const r = await fetch(`${API_URL}/api/upload_photo/${uid}/${uploadMode}`, { method: 'POST', body: form });
            if(r.ok) {
                const container = document.getElementById(uploadMode === 'labs' ? 'labs-container' : 'nails-container');
                container.innerHTML = `<div class="status-msg">✅ Учтено. <span style="text-decoration:underline" onclick="openPicker('${uploadMode}')">Добавить еще</span></div>`;
            }
        } catch (e) {}
    }
</script>
</body>
</html>

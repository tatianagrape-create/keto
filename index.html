<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --tg-theme-bg: var(--tg-theme-bg-color, #ffffff);
            --tg-theme-text: var(--tg-theme-text-color, #222222);
            --tg-theme-link: var(--tg-theme-link-color, #248b65);
            --tg-theme-button: var(--tg-theme-button-color, #248b65);
            --tg-theme-button-text: var(--tg-theme-button-text-color, #ffffff);
            --tg-theme-hint: var(--tg-theme-hint-color, #999999);
        }

        body {
            font-family: -apple-system, sans-serif;
            background-color: var(--tg-theme-bg);
            color: var(--tg-theme-text);
            margin: 0; padding: 0;
            display: flex; flex-direction: column; height: 100vh;
        }

        .container { padding: 20px; flex-grow: 1; overflow-y: auto; }
        .hidden { display: none; }

        .card {
            background: rgba(127, 127, 127, 0.05);
            border-radius: 15px; padding: 15px; margin-bottom: 20px;
            border: 1px solid rgba(127, 127, 127, 0.1);
        }

        h2 { margin-top: 0; font-size: 1.2em; color: var(--tg-theme-link); }
        label { display: block; margin-bottom: 5px; font-size: 0.9em; color: var(--tg-theme-hint); }

        input {
            width: 100%; padding: 12px; margin-bottom: 15px;
            border-radius: 10px; border: 1px solid #ccc;
            box-sizing: border-box; font-size: 16px;
            background: var(--tg-theme-bg); color: var(--tg-theme-text);
        }

        button {
            width: 100%; padding: 15px; border-radius: 12px; border: none;
            background-color: var(--tg-theme-button);
            color: var(--tg-theme-button-text);
            font-weight: bold; font-size: 16px; cursor: pointer;
        }

        .nav {
            display: flex; border-top: 1px solid rgba(127, 127, 127, 0.2);
            background: var(--tg-theme-bg); padding-bottom: env(safe-area-inset-bottom);
        }
        .nav-item {
            flex: 1; text-align: center; padding: 15px;
            cursor: pointer; font-size: 0.9em;
        }
        .nav-item.active { color: var(--tg-theme-link); font-weight: bold; border-top: 2px solid var(--tg-theme-link); }

        .summary-text { font-size: 0.9em; line-height: 1.4; color: var(--tg-theme-text); white-space: pre-wrap; }
    </style>
</head>
<body>

    <div id="diary-page" class="container">
        <h2>Мой прогресс</h2>
        <div class="card">
            <div style="font-size: 0.9em; color: var(--tg-theme-hint)">Углеводы сегодня:</div>
            <div style="font-size: 32px; font-weight: bold;">
                <span id="current-carbs">0</span> <span style="font-size: 16px; color: var(--tg-theme-hint)">/ <span id="limit-carbs">20</span>г</span>
            </div>
            <p id="day-info" style="font-size: 0.8em; margin-top: 10px;">Загрузка данных...</p>
        </div>
    </div>

    <div id="profile-page" class="container hidden">
        <h2>Личный профиль</h2>
        <div class="card">
            <label>Возраст</label>
            <input type="number" id="input-age" placeholder="Сколько вам лет?">
            
            <label>Вес (кг)</label>
            <input type="number" id="input-weight" step="0.1" placeholder="Ваш текущий вес">
            
            <label>Рост (см)</label>
            <input type="number" id="input-height" placeholder="Ваш рост">
            
            <button onclick="saveProfile()">Сохранить профиль</button>
        </div>

        <div class="card">
            <h2>Анализы и здоровье</h2>
            <div id="health-summary" class="summary-text">Тут появятся выводы ИИ, когда вы пришлете фото анализов боту в чат.</div>
        </div>
    </div>

    <div class="nav">
        <div id="btn-diary" class="nav-item active" onclick="showPage('diary')">📊 Дневник</div>
        <div id="btn-profile" class="nav-item" onclick="showPage('profile')">👤 Профиль</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        // ВСТАВЬ СВОЙ URL ИЗ NGROK СЮДА
        const API_URL = "https://depletion-kindling-diffusive.ngrok-free.dev -> http://localhost:80  ";

        function showPage(page) {
            if (page === 'diary') {
                document.getElementById('diary-page').classList.remove('hidden');
                document.getElementById('profile-page').classList.add('hidden');
                document.getElementById('btn-diary').classList.add('active');
                document.getElementById('btn-profile').classList.remove('active');
                loadStats();
            } else {
                document.getElementById('diary-page').classList.add('hidden');
                document.getElementById('profile-page').classList.remove('hidden');
                document.getElementById('btn-diary').classList.remove('active');
                document.getElementById('btn-profile').classList.add('active');
                loadProfile();
            }
        }

        async function loadStats() {
            const userId = tg.initDataUnsafe.user.id;
            try {
                const res = await fetch(`${API_URL}/api/stats/${userId}`);
                const data = await res.json();
                document.getElementById('current-carbs').innerText = data.net_carbs;
                document.getElementById('limit-carbs').innerText = data.limit;
                document.getElementById('day-info').innerText = `День на кето: ${data.day}`;
            } catch (e) { console.error("Ошибка загрузки статистики"); }
        }

        async function loadProfile() {
            const userId = tg.initDataUnsafe.user.id;
            try {
                // Пытаемся получить данные профиля
                const res = await fetch(`${API_URL}/api/profile_data/${userId}`);
                if (!res.ok) return;
                const data = await res.json();
                
                if (data.age) document.getElementById('input-age').value = data.age;
                if (data.weight) document.getElementById('input-weight').value = data.weight;
                if (data.height) document.getElementById('input-height').value = data.height;
                if (data.health_summary) document.getElementById('health-summary').innerText = data.health_summary;
            } catch (e) { console.error("Ошибка загрузки профиля"); }
        }

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #f0f0f0; padding: 20px; margin: 0; }
        .card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .hidden { display: none; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #248b65; color: white; border: none; border-radius: 8px; font-weight: bold; }
        .nav { position: fixed; bottom: 0; left: 0; width: 100%; display: flex; background: white; border-top: 1px solid #ddd; }
        .nav-item { flex: 1; text-align: center; padding: 15px; cursor: pointer; }
        .active { color: #248b65; font-weight: bold; }
    </style>
</head>
<body>

    <div id="page-diary">
        <div class="card">
            <h2>Дневник кето</h2>
            <p>Углеводы сегодня: <b id="carbs">0</b> / <span id="limit">20</span>г</p>
            <p id="day">Загрузка...</p>
        </div>
    </div>

    <div id="page-profile" class="hidden">
        <div class="card">
            <h2>Профиль</h2>
            <label>Возраст:</label>
            <input type="number" id="age" placeholder="25">
            <label>Вес (кг):</label>
            <input type="number" id="weight" step="0.1" placeholder="70.5">
            <label>Рост (см):</label>
            <input type="number" id="height" placeholder="170">
            <button onclick="saveData()">Сохранить</button>
        </div>
        <div class="card">
            <h3>Резюме здоровья:</h3>
            <p id="health">Здесь будут ваши анализы</p>
        </div>
    </div>

    <div class="nav">
        <div class="nav-item active" id="btn-diary" onclick="show('diary')">📊 Дневник</div>
        <div class="nav-item" id="btn-profile" onclick="show('profile')">👤 Профиль</div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // ОБЯЗАТЕЛЬНО ПРОВЕРЬ ЭТУ ССЫЛКУ:
        const API_URL = "https://depletion-kindling-diffusive.ngrok-free.dev";

        function show(page) {
            if (page === 'diary') {
                document.getElementById('page-diary').classList.remove('hidden');
                document.getElementById('page-profile').classList.add('hidden');
                document.getElementById('btn-diary').classList.add('active');
                document.getElementById('btn-profile').classList.remove('active');
                loadStats();
            } else {
                document.getElementById('page-diary').classList.add('hidden');
                document.getElementById('page-profile').classList.remove('hidden');
                document.getElementById('btn-diary').classList.remove('active');
                document.getElementById('btn-profile').classList.add('active');
                loadProfile();
            }
        }

        async function loadStats() {
            const uid = tg.initDataUnsafe.user.id;
            try {
                const r = await fetch(`${API_URL}/api/stats/${uid}`);
                const d = await r.json();
                document.getElementById('carbs').innerText = d.net_carbs || 0;
                document.getElementById('limit').innerText = d.limit || 20;
                document.getElementById('day').innerText = "День: " + (d.day || 1);
            } catch (e) { document.getElementById('day').innerText = "Ошибка связи"; }
        }

        async function loadProfile() {
            const uid = tg.initDataUnsafe.user.id;
            try {
                const r = await fetch(`${API_URL}/api/profile_data/${uid}`);
                if (r.ok) {
                    const d = await r.json();
                    if(d.age) document.getElementById('age').value = d.age;
                    if(d.weight) document.getElementById('weight').value = d.weight;
                    if(d.height) document.getElementById('height').value = d.height;
                    if(d.health_summary) document.getElementById('health').innerText = d.health_summary;
                }
            } catch (e) { console.log("Профиль еще пуст"); }
        }

        async function saveData() {
            const uid = tg.initDataUnsafe.user.id;
            const data = {
                "возраст": document.getElementById('age').value,
                "вес": document.getElementById('weight').value,
                "рост": document.getElementById('height').value,
                "пол": "не указан"
            };

            try {
                const r = await fetch(`${API_URL}/api/profile/${uid}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });
                if (r.ok) tg.showAlert("✅ Сохранено!");
            } catch (e) { tg.showAlert("❌ Ошибка!"); }
        }

        loadStats(); // Стартовая загрузка
    </script>
</body>
</html>
